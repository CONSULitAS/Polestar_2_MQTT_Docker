name: Python Unit Tests

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  pytest:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest
